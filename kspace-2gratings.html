const STORAGE_KEY = "wglab_pw_v1";
function b64d(s){
  const bin = atob(s);
  const arr = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i] = bin.charCodeAt(i);
  return arr;
}
async function deriveKey(password, salt, iters){
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey("raw", enc.encode(password), {name:"PBKDF2"}, false, ["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2", salt: salt, iterations: iters, hash:"SHA-256"}, baseKey, {name:"AES-GCM", length:256}, false, ["decrypt"]);
}
async function decrypt(password){
  const salt = b64d(PAYLOAD.salt);
  const iv = b64d(PAYLOAD.iv);
  const ct = b64d(PAYLOAD.ct);
  const key = await deriveKey(password, salt, PAYLOAD.iter);
  const plaintext = await crypto.subtle.decrypt({name:"AES-GCM", iv: iv}, key, ct);
  return new TextDecoder("utf-8").decode(plaintext);
}
function render(html){
  document.open();
  document.write(html);
  document.close();
}
async function tryUnlock(password, persist){
  try{
    const html = await decrypt(password);
    if(persist){ try{ sessionStorage.setItem(STORAGE_KEY, password); }catch(e){} }
    render(html);
    return true;
  }catch(e){ return false; }
}
(async function autoUnlock(){
  let cached = null;
  try{ cached = sessionStorage.getItem(STORAGE_KEY); }catch(e){}
  if(cached){
    const ok = await tryUnlock(cached, false);
    if(ok) return;
    try{ sessionStorage.removeItem(STORAGE_KEY); }catch(e){}
  }
  document.getElementById("gate").style.display = "block";
})();
document.getElementById("form").addEventListener("submit", async function(e){
  e.preventDefault();
  const btn = document.getElementById("btn");
  const errEl = document.getElementById("err");
  const pw = document.getElementById("pw").value;
  if(!pw) return;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>解密中...';
  errEl.classList.remove("show");
  errEl.textContent = " ";
  await new Promise(function(r){ setTimeout(r, 30); });
  const ok = await tryUnlock(pw, true);
  if(!ok){
    btn.disabled = false;
    btn.textContent = "解鎖";
    errEl.textContent = "密碼錯誤";
    errEl.classList.add("show");
    document.getElementById("pw").select();
  }
});
</script>
