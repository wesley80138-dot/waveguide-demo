<title>Waveguide Lab — Locked</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  background:#05070d;color:#e6ecf5;
  font-family:'Inter','Segoe UI','Helvetica Neue',-apple-system,Arial,'PingFang TC','Microsoft JhengHei',sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
body{
  background:
    radial-gradient(ellipse 80% 60% at 50% 20%, rgba(94,224,255,0.10), transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(160,112,255,0.08), transparent 60%),
    #05070d;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.gate{
  width:100%;max-width:380px;
  background:linear-gradient(180deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01));
  border:1px solid #1c2740;
  border-radius:14px;
  padding:36px 32px 28px;
  position:relative;
  box-shadow:0 24px 64px rgba(0,0,0,0.5);
}
.gate::before{
  content:"";position:absolute;inset:-1px;border-radius:14px;
  background:linear-gradient(135deg,rgba(94,224,255,0.3),transparent 50%,rgba(160,112,255,0.2));
  z-index:-1;filter:blur(16px);opacity:0.5;
}
.lock-icon{
  width:48px;height:48px;
  background:rgba(94,224,255,0.08);
  border:1px solid rgba(94,224,255,0.3);
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 18px;
  color:#5ee0ff;
}
h1{font-size:18px;font-weight:600;text-align:center;letter-spacing:0.3px;margin-bottom:6px;}
.sub{font-size:12.5px;color:#8a9ab2;text-align:center;margin-bottom:24px;}
.row{position:relative;margin-bottom:14px;}
input[type=password],input[type=text]{
  width:100%;
  background:rgba(0,0,0,0.3);
  border:1px solid #2a3a5c;
  border-radius:8px;
  padding:13px 14px;
  font-size:14px;color:#e6ecf5;
  font-family:inherit;letter-spacing:0.5px;
  outline:none;transition:border-color .2s,box-shadow .2s;
}
input:focus{border-color:#5ee0ff;box-shadow:0 0 0 3px rgba(94,224,255,0.15);}
input::placeholder{color:#5a6a82;}
button{
  width:100%;
  background:linear-gradient(135deg,#5ee0ff,#a070ff);
  color:#05070d;font-weight:600;
  font-size:14px;font-family:inherit;
  padding:13px;border:none;border-radius:8px;
  cursor:pointer;
  transition:transform .15s,box-shadow .2s,opacity .2s;
  box-shadow:0 4px 16px rgba(94,224,255,0.25);
}
button:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 24px rgba(94,224,255,0.35);}
button:disabled{opacity:0.5;cursor:not-allowed;}
.err{font-size:12px;color:#ff6c6c;text-align:center;margin-top:12px;min-height:16px;opacity:0;transition:opacity .2s;}
.err.show{opacity:1;}
.foot{margin-top:20px;font-size:10.5px;color:#5a6a82;text-align:center;letter-spacing:0.3px;}
.spinner{
  display:inline-block;width:14px;height:14px;
  border:2px solid rgba(5,7,13,0.3);
  border-top-color:#05070d;
  border-radius:50%;
  animation:spin 0.6s linear infinite;
  margin-right:6px;vertical-align:-2px;
}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>

      <rect x="3" y="11" width="18" height="11" rx="2"/>

const STORAGE_KEY = "wglab_pw_v1";

function b64d(s){
  const bin = atob(s);
  const arr = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

async function deriveKey(password, salt, iters){
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey(
    "raw", enc.encode(password), {name:"PBKDF2"}, false, ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    {name:"PBKDF2", salt: salt, iterations: iters, hash:"SHA-256"},
    baseKey,
    {name:"AES-GCM", length:256},
    false,
    ["decrypt"]
  );
}

async function decrypt(password){
  const salt = b64d(PAYLOAD.salt);
  const iv = b64d(PAYLOAD.iv);
  const ct = b64d(PAYLOAD.ct);
  const key = await deriveKey(password, salt, PAYLOAD.iter);
  const plaintext = await crypto.subtle.decrypt({name:"AES-GCM", iv: iv}, key, ct);
  return new TextDecoder("utf-8").decode(plaintext);
}

function render(html){
  document.open();
  document.write(html);
  document.close();
}

async function tryUnlock(password, persist){
  try{
    const html = await decrypt(password);
    if(persist){
      try{ sessionStorage.setItem(STORAGE_KEY, password); }catch(e){}
    }
    render(html);
    return true;
  }catch(e){
    return false;
  }
}

(async function autoUnlock(){
  let cached = null;
  try{ cached = sessionStorage.getItem(STORAGE_KEY); }catch(e){}
  if(cached){
    const ok = await tryUnlock(cached, false);
    if(ok) return;
    try{ sessionStorage.removeItem(STORAGE_KEY); }catch(e){}
